{% extends 'base.html' %}
{% load static %}

{% block css %}
<link rel="stylesheet" href="{% static 'css/produtos.css' %}">
{% endblock %}
{% block js %}
<script src="{% static 'js/produtos.js' %}"></script>
{% endblock %}

{% block content %}
<!-- conteudo -->



<!-- aqui ta puxando todos os produtos mas tem que mudar pra puxar nao todos de uma vez se nao vai de f o site -->
 <div class="container">
    <div class="filtro">
        <h1>Filtros</h1>
        
        <form method="get">
            <ul>
                {% for c in categorias %}
                <li>
                    <label>
                        <input type="checkbox" name="categoria" value="{{ c.slug }}">
                        {{ c.nome }}
                    </label>
                </li>
                {% endfor %}
            </ul>
            <button type="submit">Filtrar</button>
        </form>
    </div>

    <div class="container-itens">
        <div class="container-produtos">
            {% for p in produtos %}
            <a href="{% url 'produto' p.slug %}">
                <div class="img-container">
                    <img src="{{ p.imagens.first.imagem.url }}">
                </div>
                <div class="paragrafo-produto">
                    <p>{{ p.nome }}</p>
                </div>
            </a>
            {% endfor %}
        </div>
        
    </div>
</div>
{% endblock %}

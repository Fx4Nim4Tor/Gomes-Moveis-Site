<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>{{ acao }} Categoria - ADM</title>
</head>
<body>
    <h1>{{ acao }} Categoria</h1>
    <a href="{% url 'adm_categorias' %}">← Voltar</a>

    {% if erro %}
        <p style="color:red">{{ erro }}</p>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        <label>Nome</label>
        <input type="text" name="nome" value="{{ categoria.nome|default:'' }}" required>
        <button type="submit">{{ acao }}</button>
    </form>
</body>
</html>
